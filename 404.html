<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found</title>
    <style>
        :root {
            --bg-color: #f5f6f8;
            --text-color: #222222;
            --text-muted: #666666;
            --card-bg: #ffffff;
            --border-color: #cccccc;
            --row-hover: #e8f0fe;
            --link-color: #0366d6;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --focus-ring: #0366d6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --text-muted: #999999;
                --card-bg: #1e1e1e;
                --border-color: #333333;
                --row-hover: #2c3e50;
                --link-color: #66b2ff;
                --shadow: 0 4px 15px rgba(0,0,0,0.4);
                --focus-ring: #66b2ff;
            }
        }

        body {
            font-family: ui-sans-serif, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 3rem 2rem;
            border-radius: 6px;
            box-shadow: var(--shadow);
            max-width: 480px;
            width: 90%;
        }

        h1 {
            font-family: Consolas, "Courier New", monospace;
            font-size: 5rem;
            margin: 0 0 10px 0;
            line-height: 1;
            color: var(--text-color);
        }

        h2 {
            font-size: 1.25rem;
            font-weight: normal;
            margin: 0 0 1rem 0;
            color: var(--text-muted);
        }

        p {
            color: var(--text-muted);
            margin: 0 0 2rem 0;
            line-height: 1.6;
            font-size: 15px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-family: inherit;
        }

        .btn img.icon {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            vertical-align: middle;
        }

        .btn:hover {
            background-color: var(--row-hover);
            border-color: var(--link-color);
        }

        .btn:focus {
            outline: 2px dashed var(--focus-ring);
            outline-offset: -2px;
        }

        /* Consistent, low-profile CC BY 2.5 compliant footer */
        .footer {
            margin-top: 2.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .footer a {
            color: var(--link-color);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Directory / Page Not Found</h2>
        <p>The file or directory you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>

        <div class="button-group">
            <button type="button" class="btn" onclick="history.back()">
                <img class="icon" src="{{ '/assets/icons/arrow_left.png' | relative_url }}" alt="" aria-hidden="true">
                Go Back
            </button>
            <button type="button" class="btn" onclick="location.reload()">
                <img class="icon" src="{{ '/assets/icons/arrow_refresh.png' | relative_url }}" alt="" aria-hidden="true">
                Retry
            </button>
            <a href="https://github.com/USLTD/jekyll-index-of" class="btn"> <!-- TODO // FIXME: Replace with your own homepage -->
                <img class="icon" src="{{ '/assets/icons/house.png' | relative_url }}" alt="" aria-hidden="true">
                Homepage
            </a>
        </div>

        <!-- CC BY 2.5 Compliant Footer -->
        <footer class="footer">
            Icons: <a href="https://github.com/markjames/famfamfam-silk-icons" target="_blank" rel="noopener noreferrer">Silk Icon Set</a> by FamFamFam (Mark James) / Licensed under <a href="https://creativecommons.org/licenses/by/2.5/" target="_blank" rel="noopener noreferrer">CC BY 2.5</a>
        </footer>
    </div>
</body>
</html>
